<button
    type="button"
    class="theme-toggle{% if theme_toggle_modifier %} theme-toggle--{{ theme_toggle_modifier }}{% endif %}"
    {% if theme_toggle_id %}id="{{ theme_toggle_id }}"{% endif %}
    aria-label="Toggle color theme"
    aria-pressed="false"
>
    <span class="theme-toggle__icon-wrap" aria-hidden="true">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </span>
    <span class="theme-toggle__label">Theme</span>
</button>
