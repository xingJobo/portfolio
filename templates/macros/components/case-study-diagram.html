<div class="case-study-diagram case-study-diagram--{{ page.extra.diagram }}" role="img" aria-label="Target architecture diagram">
    {% if page.extra.diagram == "platform-migration" %}
    <div class="case-study-diagram__flow">
        <div class="case-study-diagram__node case-study-diagram__node--wide">
            <span class="case-study-diagram__label">Monolith</span>
            <span class="case-study-diagram__sublabel">legacy app</span>
        </div>

        <div class="case-study-diagram__arrow" aria-hidden="true"></div>

        <div class="case-study-diagram__services">
            <div class="case-study-diagram__service case-study-diagram__service--accent">API</div>
            <div class="case-study-diagram__service case-study-diagram__service--cyan">Workers</div>
            <div class="case-study-diagram__service case-study-diagram__service--accent">Auth</div>
            <div class="case-study-diagram__service case-study-diagram__service--cyan">Billing</div>
        </div>

        <div class="case-study-diagram__bus">
            <span class="case-study-diagram__label">Event bus</span>
            <span class="case-study-diagram__sublabel">async flows</span>
        </div>

        <div class="case-study-diagram__node case-study-diagram__node--wide">
            <span class="case-study-diagram__label">PostgreSQL</span>
            <span class="case-study-diagram__sublabel">+ replicas</span>
        </div>
    </div>
    <p class="case-study-diagram__caption">Target architecture</p>
    {% endif %}
</div>
