<div
    class="hero-terminal"
    x-data="heroTerminal"
    role="region"
    aria-label="Portfolio terminal"
    @click="focusInput()"
>
    <div class="hero-terminal__chrome" aria-hidden="true">
        <span class="hero-terminal__dots">
            <span class="hero-terminal__dot hero-terminal__dot--close"></span>
            <span class="hero-terminal__dot hero-terminal__dot--minimize"></span>
            <span class="hero-terminal__dot hero-terminal__dot--maximize"></span>
        </span>
        <span class="hero-terminal__title">xingjobo@portfolio:~</span>
    </div>
    <div class="hero-terminal__body">
        <pre class="hero-terminal__output" x-ref="output" x-text="output" aria-live="polite"></pre>
        <form class="hero-terminal__input-row" @submit.prevent="runCommand()">
            <label class="hero-terminal__sr-only" for="terminal-input">Terminal command</label>
            <span class="hero-terminal__prompt" aria-hidden="true">$</span>
            <input
                class="hero-terminal__input"
                id="terminal-input"
                type="text"
                x-ref="input"
                x-model="line"
                autocomplete="off"
                spellcheck="false"
                autocapitalize="off"
                enterkeyhint="go"
            >
        </form>
    </div>
    {% include "macros/components/terminal-vfs.html" %}
</div>
