<section id="contact" class="section contact">
    <div class="container">
        <div class="contact__panel">
            <h2 class="contact__title">Let's talk</h2>
            <p class="contact__lead">Have a project in mind? Send a message or reach out directly.</p>
            <form class="contact__form" action="#" method="post">
                <div class="contact__field">
                    <label class="contact__label" for="contact-name">Name</label>
                    <input class="contact__input" id="contact-name" name="name" type="text" autocomplete="name" required>
                </div>
                <div class="contact__field">
                    <label class="contact__label" for="contact-email">Email</label>
                    <input class="contact__input" id="contact-email" name="email" type="email" autocomplete="email" required>
                </div>
                <div class="contact__field">
                    <label class="contact__label" for="contact-message">Message</label>
                    <textarea class="contact__input contact__textarea" id="contact-message" name="message" rows="4" required></textarea>
                </div>
                <button class="btn btn--primary contact__submit" type="submit">Send message</button>
            </form>
        </div>
    </div>
</section>
