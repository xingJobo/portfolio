# Process section — see docs/planning/portfolio-mockup-process.svg

title: How I work
lead: A simple rhythm that I use in my daily life. Understand the task, take small steps, then check it if the DoD applies.

steps:
  - number: "01"
    title: Understand - Seeing the big picture
    summary: Clarify what needs to be build, for whom and what "done" looks like.
    bullets:
      - Read the brief and ask questions early
      - Break the task into smaller packages
      - Note down constraints (Deadline, Stack, who maintains it)
    theme: mint

  - number: "02"
    title: Build
    summary: Implement step by step, test as I move forward and keep the code easy to follow.
    bullets:
      - Small increments. One feature at a time
      - Verison control and regular commits
      - Test the feature before moving on
    theme: cyan

  - number: "03"
    title: Ship & Learn
    summary: Finish a viable product, get feedback and document for the next person.
    bullets:
      - Demo & hand off to client
      - Notes on setup, decisions made and errors encountered
      - Demo & hand off to client
    theme: mint

engagement:
  label: "Typical flow:"
  phases:
    - text: understand the task
      highlight: true
    - text: build in steps
      highlight: true
    - text: demo & refine
      highlight: true
  footnote: Same pattern wether it is a Docker lab, Cooking a meal or building a website.
