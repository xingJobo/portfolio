# Process section — see docs/planning/portfolio-mockup-process.svg

title: How I work
lead: A simple rhythm I use daily — understand the task, build in small steps, then ship and learn.

timeline:
  label: Step-by-step
  start: Start
  end: Done

steps:
  - number: "01"
    flow: understand the task
    title: Understand
    summary: Clarify what needs to be built, for whom, and what "done" looks like.
    bullets:
      - Read the brief and ask questions early
      - Break the task into smaller packages
      - Note constraints (deadline, stack, who maintains it)
    theme: mint

  - number: "02"
    flow: build in steps
    title: Build
    summary: Implement step by step, test as I go, and keep the code easy to follow.
    bullets:
      - Small increments — one feature at a time
      - Version control and regular commits
      - Test before moving on
    theme: cyan

  - number: "03"
    flow: demo & refine
    title: Ship & Learn
    summary: Finish a viable product, get feedback, and document for the next person.
    bullets:
      - Demo and hand off to the client
      - Notes on setup, decisions, and errors encountered
    theme: mint

engagement:
  label: "Typical flow:"
  footnote: Same pattern whether it's a Docker lab, cooking a meal, or building a website.
