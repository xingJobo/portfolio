      display: xingjobo@gmail.com
      tone: mint
    - label: LinkedIn
      # href: https://www.linkedin.com/in/your-profile
      display: linkedin.com/in/xingjobo
      tone: cyan
    - label: GitHub
      href: https://github.com/xingJobo
