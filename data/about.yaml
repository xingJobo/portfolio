    I'm training as a software developer, learning in two places at once: at work
    on real web projects, and at school through modules in backend, frontend,
    databases, and agile delivery.
  - |
    At work I've built shop websites, an infoscreen, and a Python game for a
    live exposition — mostly with Smarty, vanilla HTML & JS, and Python. At
    school I've shipped a Wordle game in a Scrum team, wired up multi-app stacks
    with Docker Compose, and worked with both SQL and NoSQL. I like to feel a sense of purpose.
    Purpose needs a clarity of thought and a sense of direction. I want people to enjoy my work. For customers as well as for coworkers.

