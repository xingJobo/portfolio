# Welcome text for README.md in fauxsh (see docs/architecture.md).

content: |
  Welcome dear visitor 
  This portfolio should grant you a peak into my work. My current journey in the field of information technology.

  The purpouse of this terminal is to present the portfolio in a familiar manner to developers.

  Supported commands:

    ls          lists files in this directory
    cat         read a file
    help        lists all commands
    clear       clear the screen


  Support utilities: 

    Tab completes commands and filenames. 
    ↑ / ↓ browse history.


  Happy browsing!
